<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
      /* <![CDATA[ */
        .panel {
          width: 100%;
          height: 100%;
          box-sizing: border-box;
          background: linear-gradient(180deg, #010A13 0%, #091428 50%, #010A13 100%);
          border: 1px solid #1E2328;
          border-radius: 4px;
          padding: 20px 16px;
          text-align: center;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .title {
          font-family: Georgia, "Times New Roman", serif;
          font-size: 16px;
          letter-spacing: 4px;
          color: #C89B3C;
          margin-bottom: 16px;
        }
        .contrib-wrap {
          display: inline-block;
          background: #0D1117;
          border: 1px solid #21262D;
          border-radius: 8px;
          padding: 14px 12px 12px;
          box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.35);
          text-align: left;
        }
        @keyframes cell-drop {
          0%   { transform: translateY(-420px); opacity: 0; }
          8%   { opacity: 1; }
          62%  { transform: translateY(0); }
          72%  { transform: translateY(-10px); }
          82%  { transform: translateY(0); }
          100% { transform: translateY(0); opacity: 1; }
        }
        .contrib-months {
          display: grid;
          grid-template-columns: 22px repeat(19, 16px);
          gap: 0;
          margin-bottom: 6px;
          color: #8B949E;
          font-family: monospace;
          font-size: 10px;
        }
        .contrib-months span:nth-child(2)  { grid-column: 2 / 5; }
        .contrib-months span:nth-child(3)  { grid-column: 5 / 8; }
        .contrib-months span:nth-child(4)  { grid-column: 8 / 11; }
        .contrib-months span:nth-child(5)  { grid-column: 11 / 14; }
        .contrib-months span:nth-child(6)  { grid-column: 14 / 17; }
        .contrib-months span:nth-child(7)  { grid-column: 17 / 21; }
        .contrib-body {
          display: grid;
          grid-template-columns: 22px 1fr;
          gap: 0 6px;
          align-items: start;
        }
        .contrib-days {
          display: grid;
          grid-template-rows: repeat(7, 16px);
          color: #8B949E;
          font-family: monospace;
          font-size: 9px;
          line-height: 16px;
        }
        .contrib-grid {
          display: grid;
          grid-template-rows: repeat(7, 13px);
          grid-auto-flow: column;
          grid-auto-columns: 13px;
          gap: 3px;
        }
        .cell {
          width: 13px;
          height: 13px;
          border-radius: 3px;
          opacity: 0;
          animation: cell-drop 0.42s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }
        .c0 { background: #161B22; }
        .c1 { background: #0E4429; }
        .c2 { background: #006D32; }
        .c3 { background: #26A641; }
        .c4 { background: #39D353; }
        .contrib-legend {
          margin-top: 12px;
          text-align: right;
          color: #8B949E;
          font-family: monospace;
          font-size: 10px;
        }
        .swatch {
          display: inline-block;
          width: 11px;
          height: 11px;
          border-radius: 2px;
          margin: 0 2px;
          vertical-align: middle;
        }
        @media (prefers-reduced-motion: reduce) {
          .cell { animation: none; opacity: 1; transform: none; }
        }
      /* ]]> */
      </style>
      <div class="panel">
        <div class="title">TETRIS CONTRIBUTIONS</div>
        <div class="contrib-wrap">
