<svg fill="none" viewBox="0 0 560 160" width="560" height="160"
     xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .container {
          width: 560px; height: 160px;
          display: flex; align-items: center; justify-content: center;
        }
        .neu-card {
          background: #E8ECF1;
          border-radius: 24px;
          padding: 28px 56px;
          text-align: center;
          box-shadow: 8px 8px 16px #CDD3DA, -8px -8px 16px #FFFFFF;
          transition: box-shadow 0.3s ease;
        }
        .neu-card h1 {
          color: #2D3436;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
          font-size: 26px;
          font-weight: 700;
          letter-spacing: 0.5px;
        }
        .neu-card p {
          color: #636E72;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
          font-size: 14px;
          margin-top: 6px;
          letter-spacing: 0.3px;
        }
        @media (prefers-color-scheme: dark) {
          .neu-card {
            background: #2A2A30;
            box-shadow: 8px 8px 16px #1C1C21, -8px -8px 16px #38383F;
          }
          .neu-card h1 { color: #E2E8F0; }
          .neu-card p  { color: #94A3B8; }
        }
      </style>
      <div class="container">
        <div class="neu-card">
          <h1>flashjose</h1>
          <p>C&#x2B;&#x2B;  &middot;  Reverse Engineering</p>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
