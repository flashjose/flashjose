<svg width="560" height="130" viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neu" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset dx="-2" dy="-2" in="blur" result="lightOff"/>
      <feFlood flood-color="#FFFFFF" flood-opacity="0.9" result="lightCol"/>
      <feComposite in="lightCol" in2="lightOff" operator="in" result="lightSh"/>
      <feOffset dx="5" dy="5" in="blur" result="darkOff"/>
      <feFlood flood-color="#CDD3DA" flood-opacity="0.45" result="darkCol"/>
      <feComposite in="darkCol" in2="darkOff" operator="in" result="darkSh"/>
      <feMerge>
        <feMergeNode in="lightSh"/>
        <feMergeNode in="darkSh"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="560" height="130" fill="#FFFFFF"/>

  <rect x="30" y="10" width="500" height="110" rx="20" fill="#E8ECF1" filter="url(#neu)"/>

  <text x="280" y="58" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="28" font-weight="bold" fill="#2D3436">flashjose</text>
  <text x="280" y="88" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" fill="#636E72">C++  ·  Reverse Engineering</text>
</svg>
