<svg fill="none" viewBox="0 0 800 250" width="800" height="250" xmlns="http://www.w3.org/2000/svg">
    <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml">
            <style>
            /* <![CDATA[ */
                /* ================= 基础容器 ================= */
                .container {
                    background-color: #1e1e1e;
                    font-family: Consolas, Monaco, 'Courier New', monospace;
                    font-size: 18px;
                    height: 100%;
                    width: 100%;
                    border-radius: 8px;
                    overflow: hidden;
                    color: #d4d4d4;
                    line-height: 1.5;
                    box-sizing: border-box;
                }
                .header {
                    background-color: #252526;
                    height: 38px;
                    display: flex;
                    align-items: center;
                    padding-left: 12px;
                    border-bottom: 1px solid #111;
                }
                .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
                .red { background-color: #ff5f56; }
                .yellow { background-color: #ffbd2e; }
                .green { background-color: #27c93f; }
                .tab {
                    background-color: #1e1e1e;
                    color: #e8e8e8;
                    padding: 8px 25px;
                    font-size: 13px;
                    margin-left: 15px;
                    border-top: 1px solid #007acc;
                    display: flex;
                    align-items: center;
                    height: 100%;
                }
                .editor { padding: 20px; display: flex; }
                .line-numbers {
                    text-align: right;
                    color: #858585;
                    width: 30px;
                    margin-right: 15px;
                    user-select: none;
                }
                .code-lines { flex-grow: 1; }

                /* ================= 动画逻辑 (最稳健版本) ================= */
                /* 外层包装：限制最终宽度，不参与动画 */
                .line-wrap {
                    height: 27px; /* 固定行高防止抖动 */
                    display: block;
                    margin-bottom: 2px;
                }
                
                /* 内层文本：初始宽度为0，负责展开 */
                .line-text {
                    display: inline-block;
                    white-space: nowrap;
                    overflow: hidden;
                    width: 0; /* 初始隐藏 */
                    border-right: 2px solid transparent;
                }

                /* 通用动画：走到父容器的 100% */
                @keyframes typing {
                    to { width: 100%; }
                }
                /* 光标闪烁：仅在打字时显示 */
                @keyframes typing-cursor {
                    0%, 100% { border-color: transparent; }
                    50% { border-color: #d4d4d4; }
                }
                /* 最终光标：永久闪烁 */
                @keyframes blink-cursor {
                    0%, 100% { border-color: transparent; }
                    50% { border-color: #d4d4d4; }
                }

                /* 时间轴设置 */
                /* 注意：ID 加在内层 line-text 上 */
                #T1 { animation: typing 1.5s steps(20, end) 0.5s forwards, typing-cursor 1.5s step-end 0.5s forwards; }
                #T2 { animation: typing 1.5s steps(20, end) 2.0s forwards, typing-cursor 1.5s step-end 2.0s forwards; }
                #T3 { animation: typing 1.0s steps(12, end) 3.5s forwards, typing-cursor 1.0s step-end 3.5s forwards; }
                #T4 { animation: typing 2.5s steps(30, end) 4.5s forwards, typing-cursor 2.5s step-end 4.5s forwards; }
                #T5 { animation: typing 1.5s steps(15, end) 7.0s forwards, typing-cursor 1.5s step-end 7.0s forwards; }
                #T6 { animation: typing 0.2s steps(2, end) 8.5s forwards, blink-cursor 1s step-end 8.7s infinite; }

                /* 语法高亮 */
                .kwd { color: #569cd6; }
                .str { color: #ce9178; }
                .mac { color: #c586c0; }
                .ty { color: #4ec9b0; }
                .fn { color: #dcdcaa; }
                .obj { color: #9cdcfe; }
                .punc { color: #d4d4d4; }
            /* ]]> */
            </style>

            <div class="container">
                <div class="header">
                    <div class="dot red"></div>
                    <div class="dot yellow"></div>
                    <div class="dot green"></div>
                    <div class="tab">
                        <span style="color: #00599C; font-weight: 900; margin-right: 6px; font-size: 14px;">C++</span> main.cpp
                    </div>
                </div>

                <div class="editor">
                    <div class="line-numbers">
                        <div>1</div><div>2</div><div>3</div><div>4</div><div>5</div><div>6</div>
                    </div>
                    <div class="code-lines">
                        <!-- 
                           修改原理：
                           1. 外层 .line-wrap 使用 style="width: XXch" 设定这行代码最终有多长。
                           2. 内层 .line-text 初始宽度是 0，动画播放时会慢慢填满外层定义的宽度。
                           这样既保证了不直接显示，又不需要复杂的 CSS 变量。
                        -->
                        <div class="line-wrap" style="width: 20ch;">
                            <span class="line-text" id="T1"><span class="mac">#include</span><span class="str">&lt;iostream&gt;</span></span>
                        </div>
                        
                        <div class="line-wrap" style="width: 21ch;">
                            <span class="line-text" id="T2"><span class="kwd">using</span> <span class="kwd">namespace</span> <span class="ty">std</span><span class="punc">;</span></span>
                        </div>
                        
                        <div class="line-wrap" style="width: 13ch;">
                            <span class="line-text" id="T3"><span class="kwd">int</span> <span class="fn">main</span><span class="punc">(){</span></span>
                        </div>
                        
                        <div class="line-wrap" style="width: 28ch;">
                            <span class="line-text" id="T4">&#160;&#160;&#160;&#160;<span class="obj">cout</span><span class="punc">&lt;&lt;</span><span class="str">"Hello World!"</span><span class="punc">;</span></span>
                        </div>
                        
                        <div class="line-wrap" style="width: 16ch;">
                            <span class="line-text" id="T5">&#160;&#160;&#160;&#160;<span class="kwd">return</span> <span class="obj">0</span><span class="punc">;</span></span>
                        </div>
                        
                        <div class="line-wrap" style="width: 2ch;">
                            <span class="line-text" id="T6"><span class="punc">}</span></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </foreignObject>
</svg>
